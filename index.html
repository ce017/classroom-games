<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCADE // Unblocked Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #10b981;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* SCANLINE OVERLAY */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 20px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--text);
    white-space: nowrap;
  }
  .logo span { color: var(--accent2); }
  .logo-dot { color: var(--accent3); }

  .url-bar {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    max-width: 600px;
  }
  .url-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 0 12px;
    height: 36px;
  }
  .url-bar input::placeholder { color: var(--muted); }
  .url-bar button {
    background: var(--accent);
    border: none;
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 0 16px;
    height: 36px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    letter-spacing: 0.05em;
  }
  .url-bar button:hover { background: #6d28d9; }

  .header-actions { display: flex; gap: 8px; margin-left: auto; }
  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--accent2); color: var(--accent2); }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s;
  }
  .sidebar.collapsed { width: 0; border: none; }

  .sidebar-search {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 10px;
    outline: none;
  }
  .sidebar-search input:focus { border-color: var(--accent2); }
  .sidebar-search input::placeholder { color: var(--muted); }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .stab {
    flex: 1;
    padding: 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .stab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  .game-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .category-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 6px 6px;
  }

  .game-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .game-item:hover { background: var(--surface2); }
  .game-item.active { background: var(--surface2); border-color: var(--accent); }
  .game-emoji { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; }
  .game-info { flex: 1; min-width: 0; }
  .game-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .game-meta { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .game-fav {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 13px; padding: 2px; opacity: 0;
    transition: all 0.1s;
  }
  .game-item:hover .game-fav { opacity: 1; }
  .game-fav.faved { opacity: 1; color: var(--accent3); }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .game-header {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 44px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 12px;
    flex-shrink: 0;
  }
  #game-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  #game-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(124,58,237,0.2);
    color: var(--accent);
    border: 1px solid rgba(124,58,237,0.3);
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .spacer { flex: 1; }
  .btn-fullscreen {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .btn-fullscreen:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-reload {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-reload:hover { border-color: var(--accent3); color: var(--accent3); }

  .frame-container {
    flex: 1;
    position: relative;
    background: #000;
  }
  #gameFrame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* SPLASH */
  #splash {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--bg);
  }
  .splash-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -2px;
  }
  .splash-logo span { color: var(--accent2); }
  .splash-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }
  .splash-hint {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 6px;
    margin-top: 8px;
  }
  .splash-hint kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: inherit;
  }

  /* FULLSCREEN OVERLAY */
  #fullscreenOverlay {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: #000;
    display: none;
    flex-direction: column;
  }
  #fullscreenOverlay.active { display: flex; }
  #fullscreenOverlay iframe {
    flex: 1;
    border: none;
  }
  .fs-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #0a0a0f;
    border-top: 1px solid #1a1a26;
  }
  .fs-bar span { font-family: 'Space Mono', monospace; font-size: 11px; color: #6b6b8a; flex: 1; }
  .fs-bar button {
    background: #1a1a26;
    border: 1px solid #2a2a3e;
    color: #e8e8f0;
    padding: 5px 14px;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
  }
  .fs-bar button:hover { background: #2a2a3e; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 8px;
    z-index: 99999;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">ARC<span>ADE</span><span class="logo-dot">//</span></div>
  <div class="url-bar">
    <input type="text" id="urlInput" placeholder="Paste any game URL or itch.io embed link..." autocomplete="off" spellcheck="false">
    <button onclick="loadCustom()">LOAD â¶</button>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="toggleSidebar()" title="Toggle sidebar">â°</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search games..." oninput="filterGames()">
    </div>
    <div class="sidebar-tabs">
      <div class="stab active" onclick="switchTab('all', this)">ALL</div>
      <div class="stab" onclick="switchTab('favs', this)">FAVS â</div>
    </div>
    <div class="game-list" id="gameList"></div>
  </aside>

  <div class="main">
    <div class="game-header">
      <span id="game-title">SELECT A GAME</span>
      <span id="game-tag" style="display:none"></span>
      <div class="spacer"></div>
      <button class="btn-reload" id="reloadBtn" onclick="reloadGame()" title="Reload game" style="display:none">âº</button>
      <button class="btn-fullscreen" id="fsBtn" onclick="openFullscreen()" style="display:none">â¶ FULLSCREEN</button>
    </div>
    <div class="frame-container">
      <div id="splash">
        <div class="splash-logo">ARC<span>ADE</span></div>
        <div class="splash-sub">UNBLOCKED GAMES PORTAL</div>
        <div class="splash-hint">Pick a game from the sidebar or paste a URL above</div>
        <div class="splash-hint">Tip: for itch.io games, copy the embed URL from the game page â it usually starts with <kbd>html-classic.itch.zone</kbd></div>
      </div>
      <iframe id="gameFrame" src="about:blank" allowfullscreen
        allow="autoplay; fullscreen; pointer-lock"
        sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups allow-modals"></iframe>
    </div>
  </div>
</div>

<!-- FULLSCREEN OVERLAY -->
<div id="fullscreenOverlay">
  <iframe id="fsFrame" allowfullscreen allow="autoplay; fullscreen; pointer-lock"
    sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups allow-modals"></iframe>
  <div class="fs-bar">
    <span id="fsTitle"></span>
    <button onclick="closeFullscreen()">â EXIT FULLSCREEN</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const GAMES = [
  { id:1, title:"HexGL", tag:"Racing", emoji:"ðï¸", url:"https://hexgl.bkcore.com/play/", desc:"High-speed futuristic racing" },
  { id:2, title:"2048", tag:"Puzzle", emoji:"ð¢", url:"https://play2048.co/", desc:"Slide tiles to reach 2048" },
  { id:3, title:"Wordle", tag:"Word", emoji:"ð¤", url:"https://wordlegame.org/", desc:"Guess the 5-letter word" },
  { id:4, title:"Flappy Bird", tag:"Arcade", emoji:"ð¦", url:"https://flappybird.io/", desc:"Classic tap-to-fly game" },
  { id:5, title:"Chess", tag:"Strategy", emoji:"âï¸", url:"https://www.chess.com/play/computer", desc:"Play chess vs computer" },
  { id:6, title:"Minesweeper", tag:"Puzzle", emoji:"ð£", url:"https://minesweeperonline.com/", desc:"Classic mine-clearing puzzle" },
  { id:7, title:"Slope", tag:"Arcade", emoji:"â¡", url:"https://slope-game.github.io/", desc:"Roll a ball down infinite slope" },
  { id:8, title:"Tetris", tag:"Puzzle", emoji:"ð¦", url:"https://tetris.com/play-tetris", desc:"The classic block stacker" },
  { id:9, title:"Cookie Clicker", tag:"Idle", emoji:"ðª", url:"https://orteil.dashnet.org/cookieclicker/", desc:"Click cookies, build empire" },
  { id:10, title:"Krunker.io", tag:"Shooter", emoji:"ð¯", url:"https://krunker.io/", desc:"Fast-paced browser FPS" },
  { id:11, title:"Agar.io", tag:"IO Game", emoji:"ðµ", url:"https://agar.io/", desc:"Grow your cell, eat others" },
  { id:12, title:"Slither.io", tag:"IO Game", emoji:"ð", url:"https://slither.io/", desc:"Grow your snake, dominate" },
  { id:13, title:"Paper.io", tag:"IO Game", emoji:"ð", url:"https://paper-io.com/", desc:"Claim territory on the board" },
  { id:14, title:"Little Alchemy", tag:"Puzzle", emoji:"âï¸", url:"https://littlealchemy2.com/", desc:"Combine elements to discover" },
  { id:15, title:"Fireboy & Watergirl", tag:"Platform", emoji:"ð¥", url:"https://www.fireboy-and-watergirl.com/", desc:"Co-op platformer duo" },
];

let currentGame = null;
let currentTab = 'all';
let favorites = JSON.parse(localStorage.getItem('arcade_favs') || '[]');

function saveFavs() {
  localStorage.setItem('arcade_favs', JSON.stringify(favorites));
}

function toggleFav(id, e) {
  e.stopPropagation();
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
    toast('Removed from favorites');
  } else {
    favorites.push(id);
    toast('Added to favorites â');
  }
  saveFavs();
  renderList();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function filterGames() { renderList(); }

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = GAMES;
  if (currentTab === 'favs') list = list.filter(g => favorites.includes(g.id));
  if (q) list = list.filter(g => g.title.toLowerCase().includes(q) || g.tag.toLowerCase().includes(q));

  const categories = {};
  list.forEach(g => {
    if (!categories[g.tag]) categories[g.tag] = [];
    categories[g.tag].push(g);
  });

  const container = document.getElementById('gameList');
  if (list.length === 0) {
    container.innerHTML = '<div style="padding:24px;text-align:center;font-size:11px;color:var(--muted)">' + (currentTab === 'favs' ? 'No favorites yet.<br>Click â to save a game.' : 'No games found.') + '</div>';
    return;
  }

  let html = '';
  Object.keys(categories).forEach(cat => {
    html += `<div class="category-label">${cat}</div>`;
    categories[cat].forEach(g => {
      const isFav = favorites.includes(g.id);
      const isActive = currentGame && currentGame.id === g.id;
      html += `<div class="game-item${isActive?' active':''}" onclick="loadGame(${g.id})">
        <div class="game-emoji">${g.emoji}</div>
        <div class="game-info">
          <div class="game-name">${g.title}</div>
          <div class="game-meta">${g.desc}</div>
        </div>
        <button class="game-fav${isFav?' faved':''}" onclick="toggleFav(${g.id}, event)" title="${isFav?'Unfavorite':'Favorite'}">â</button>
      </div>`;
    });
  });
  container.innerHTML = html;
}

function loadGame(id) {
  const g = GAMES.find(x => x.id === id);
  if (!g) return;
  currentGame = g;
  setFrame(g.url, g.title, g.tag);
  renderList();
}

function loadCustom() {
  let url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  currentGame = { id: -1, title: url, tag: 'CUSTOM', url };
  setFrame(url, url, 'CUSTOM');
  renderList();
}

function setFrame(url, title, tag) {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('gameFrame').src = url;
  document.getElementById('game-title').textContent = title.length > 50 ? title.slice(0,50)+'...' : title;
  const tagEl = document.getElementById('game-tag');
  tagEl.textContent = tag;
  tagEl.style.display = '';
  document.getElementById('reloadBtn').style.display = '';
  document.getElementById('fsBtn').style.display = '';
}

function reloadGame() {
  const f = document.getElementById('gameFrame');
  if (f.src && f.src !== 'about:blank') { f.src = f.src; }
}

function openFullscreen() {
  if (!currentGame) return;
  const overlay = document.getElementById('fullscreenOverlay');
  document.getElementById('fsFrame').src = currentGame.url;
  document.getElementById('fsTitle').textContent = currentGame.title;
  overlay.classList.add('active');
}

function closeFullscreen() {
  const overlay = document.getElementById('fullscreenOverlay');
  overlay.classList.remove('active');
  document.getElementById('fsFrame').src = 'about:blank';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Enter key on URL bar
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadCustom();
});

// ESC to close fullscreen
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeFullscreen();
});

renderList();
</script>
</body>
</html>
